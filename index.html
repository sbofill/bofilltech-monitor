<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>VisualMonitor – BofillTech</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <style>
    body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif; background: #f3f4f6; }

    /* Status badge */
    .badge-live    { background: #16a34a; color: #fff; }
    .badge-warning { background: #d97706; color: #fff; }
    .badge-down    { background: #dc2626; color: #fff; }

    /* Card hover */
    .site-card { transition: box-shadow .15s, transform .15s; }
    .site-card:hover { box-shadow: 0 8px 24px rgba(0,0,0,.12); transform: translateY(-2px); }

    /* Screenshot area */
    .screenshot-area { height: 170px; overflow: hidden; position: relative; }
    .screenshot-area img { width: 100%; height: 100%; object-fit: cover; object-position: top; }
    .screenshot-placeholder { display: flex; align-items: center; justify-content: center; height: 100%; }

    /* Down card tint */
    .card-down .screenshot-placeholder { background: #fee2e2; }
    .card-warning .screenshot-placeholder { background: #fff7ed; }
    .card-live .screenshot-placeholder { background: #f0f9ff; }

    /* Live dot pulse */
    @keyframes livePulse { 0%,100% { opacity: 1; } 50% { opacity: .4; } }
    .dot-live-anim { animation: livePulse 2s ease-in-out infinite; }

    /* Stat card */
    .stat-card { border-radius: 12px; }

    /* Spinner */
    @keyframes spin { to { transform: rotate(360deg); } }
    .spinner { animation: spin .8s linear infinite; }

    /* Tooltip */
    .tooltip-wrap { position: relative; }
    .tooltip-text { visibility: hidden; background: #1f2937; color: #fff; font-size: 11px; padding: 4px 8px;
      border-radius: 6px; position: absolute; top: calc(100% + 6px); left: 50%; transform: translateX(-50%);
      white-space: nowrap; z-index: 50; pointer-events: none; }
    .tooltip-wrap:hover .tooltip-text { visibility: visible; }

    /* Scrollbar */
    ::-webkit-scrollbar { width: 6px; } ::-webkit-scrollbar-track { background: #f1f1f1; }
    ::-webkit-scrollbar-thumb { background: #d1d5db; border-radius: 3px; }

    /* Setup overlay */
    #setup-overlay { position: fixed; inset: 0; background: rgba(0,0,0,.5); z-index: 100;
      align-items: center; justify-content: center; }
  </style>
</head>
<body class="min-h-screen">

<!-- ═══════════════════════════════════════════
     HEADER
═══════════════════════════════════════════ -->
<header class="bg-white border-b border-gray-200 sticky top-0 z-40">
  <div class="max-w-screen-xl mx-auto px-6 py-3 flex items-center justify-between">
    <!-- Logo -->
    <div class="flex items-center gap-3">
      <div class="w-9 h-9 rounded-xl bg-blue-600 flex items-center justify-center shadow-sm">
        <svg xmlns="http://www.w3.org/2000/svg" class="w-5 h-5 text-white" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
          <path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/><circle cx="12" cy="12" r="3"/>
        </svg>
      </div>
      <div>
        <div class="font-bold text-gray-900 leading-tight text-base">VisualMonitor</div>
        <div class="text-xs text-gray-400 leading-tight">AI-Powered Uptime Tracking</div>
      </div>
    </div>
    <!-- Right -->
    <div class="flex items-center gap-3">
      <!-- Last updated -->
      <span id="last-updated" class="text-xs text-gray-400 hidden sm:block"></span>
      <!-- Refresh button -->
      <button id="refresh-btn" onclick="loadData()" class="tooltip-wrap w-8 h-8 rounded-full hover:bg-gray-100 flex items-center justify-center text-gray-500" title="Refresh">
        <svg id="refresh-icon" xmlns="http://www.w3.org/2000/svg" class="w-4 h-4" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <polyline points="23 4 23 10 17 10"/><polyline points="1 20 1 14 7 14"/>
          <path d="M3.51 9a9 9 0 0 1 14.85-3.36L23 10M1 14l4.64 4.36A9 9 0 0 0 20.49 15"/>
        </svg>
        <span class="tooltip-text">Refresh now</span>
      </button>
      <!-- Bell -->
      <button class="w-8 h-8 rounded-full hover:bg-gray-100 flex items-center justify-center text-gray-500">
        <svg xmlns="http://www.w3.org/2000/svg" class="w-4 h-4" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <path d="M18 8A6 6 0 0 0 6 8c0 7-3 9-3 9h18s-3-2-3-9"/><path d="M13.73 21a2 2 0 0 1-3.46 0"/>
        </svg>
      </button>
      <!-- Settings -->
      <button onclick="toggleSetup()" class="w-8 h-8 rounded-full hover:bg-gray-100 flex items-center justify-center text-gray-500">
        <svg xmlns="http://www.w3.org/2000/svg" class="w-4 h-4" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <circle cx="12" cy="12" r="3"/><path d="M19.4 15a1.65 1.65 0 0 0 .33 1.82l.06.06a2 2 0 0 1-2.83 2.83l-.06-.06a1.65 1.65 0 0 0-1.82-.33 1.65 1.65 0 0 0-1 1.51V21a2 2 0 0 1-4 0v-.09A1.65 1.65 0 0 0 9 19.4a1.65 1.65 0 0 0-1.82.33l-.06.06a2 2 0 0 1-2.83-2.83l.06-.06A1.65 1.65 0 0 0 4.68 15a1.65 1.65 0 0 0-1.51-1H3a2 2 0 0 1 0-4h.09A1.65 1.65 0 0 0 4.6 9a1.65 1.65 0 0 0-.33-1.82l-.06-.06a2 2 0 0 1 2.83-2.83l.06.06A1.65 1.65 0 0 0 9 4.68a1.65 1.65 0 0 0 1-1.51V3a2 2 0 0 1 4 0v.09a1.65 1.65 0 0 0 1 1.51 1.65 1.65 0 0 0 1.82-.33l.06-.06a2 2 0 0 1 2.83 2.83l-.06.06A1.65 1.65 0 0 0 19.4 9a1.65 1.65 0 0 0 1.51 1H21a2 2 0 0 1 0 4h-.09a1.65 1.65 0 0 0-1.51 1z"/>
        </svg>
      </button>
      <!-- Avatar -->
      <div class="w-8 h-8 rounded-full bg-blue-600 flex items-center justify-center text-white text-xs font-bold">BT</div>
    </div>
  </div>
</header>
